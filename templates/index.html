{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1>{{ data.title }}</h1>
    <p style="color: var(--accent); font-family: 'IBM Plex Mono';">{{ data.date }}</p>
</div>

<div class="full-width">
    {% if data.media_type == "image" %}
        <img src="{{ data.url }}" alt="APOD" class="apod-main">
    {% else %}
        <iframe src="{{ data.url }}" frameborder="0" width="100%" height="500px"></iframe>
    {% endif %}
</div>

<div class="container">
    <p>{{ data.explanation }}</p>
</div>
{%endblock%}
